<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="hubIllustrationTitle hubIllustrationDesc">
  <title id="hubIllustrationTitle">AI agents coordinating maintenance</title>
  <desc id="hubIllustrationDesc">Stylized diagram: tenant, landlord, and contractor nodes linked through a central hub with AI agent nodes relaying messages along curved paths.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1224"/>
      <stop offset="45%" stop-color="#111d38"/>
      <stop offset="100%" stop-color="#0d1830"/>
    </linearGradient>
    <linearGradient id="wireGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#116afe"/>
      <stop offset="55%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#9443ca"/>
    </linearGradient>
    <linearGradient id="hubGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e5fe8"/>
      <stop offset="100%" stop-color="#6b3fa0"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.14)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- subtle grid -->
  <g opacity="0.12" fill="none" stroke="#7eb8ff" stroke-width="0.5">
    <path d="M0 150h800M0 300h800M0 450h800M200 0v600M400 0v600M600 0v600"/>
  </g>

  <!-- curved connection paths -->
  <g fill="none" stroke="url(#wireGrad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <path d="M175 455 Q280 380 400 318" stroke-dasharray="6 10"/>
    <path d="M625 455 Q520 380 400 318" stroke-dasharray="6 10"/>
    <path d="M400 118 Q400 210 400 248" stroke-dasharray="6 10"/>
    <path d="M175 455 Q340 300 400 248" stroke-dasharray="4 8" opacity="0.55"/>
    <path d="M625 455 Q460 300 400 248" stroke-dasharray="4 8" opacity="0.55"/>
  </g>

  <!-- bidirectional tick marks along wires (graphic "messages") -->
  <g fill="#8eb9ff" opacity="0.9">
    <circle cx="285" cy="410" r="3"/>
    <circle cx="515" cy="410" r="3"/>
    <circle cx="400" cy="195" r="3"/>
    <circle cx="310" cy="340" r="2.5"/>
    <circle cx="490" cy="340" r="2.5"/>
  </g>

  <!-- small AI agent nodes (abstract bots on the wires) -->
  <g filter="url(#nodeGlow)">
    <g transform="translate(268, 392)">
      <circle r="22" fill="url(#glassGrad)" stroke="rgba(17,106,254,0.55)" stroke-width="1.5"/>
      <circle cy="-2" r="6" fill="#116afe" opacity="0.9"/>
      <rect x="-10" y="6" width="20" height="10" rx="3" fill="rgba(17,106,254,0.35)"/>
      <path d="M -4 -10 L 0 -16 L 4 -10" stroke="#b8d9ff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </g>
    <g transform="translate(532, 392)">
      <circle r="22" fill="url(#glassGrad)" stroke="rgba(148,67,202,0.45)" stroke-width="1.5"/>
      <circle cy="-2" r="6" fill="#9443ca" opacity="0.9"/>
      <rect x="-10" y="6" width="20" height="10" rx="3" fill="rgba(148,67,202,0.3)"/>
      <path d="M -4 -10 L 0 -16 L 4 -10" stroke="#e9c4ff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </g>
    <g transform="translate(400, 208)">
      <circle r="20" fill="url(#glassGrad)" stroke="rgba(17,106,254,0.5)" stroke-width="1.5"/>
      <circle cy="-2" r="5" fill="#3b82f6"/>
      <rect x="-8" y="5" width="16" height="8" rx="2" fill="rgba(59,130,246,0.35)"/>
    </g>
  </g>

  <!-- peripheral role nodes -->
  <g font-family="Plus Jakarta Sans, system-ui, sans-serif" text-anchor="middle">
    <!-- Tenant -->
    <g transform="translate(140, 485)">
      <rect x="-58" y="-42" width="116" height="84" rx="16" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.18)" stroke-width="1.2"/>
      <path d="M 0 -22 L 22 -6 V 14 H -22 V -6 Z" fill="none" stroke="#9ec5ff" stroke-width="2.2" stroke-linejoin="round"/>
      <text y="38" fill="#c8dcff" font-size="13" font-weight="700" letter-spacing="0.04em">TENANT</text>
    </g>
    <!-- Landlord -->
    <g transform="translate(400, 88)">
      <rect x="-62" y="-40" width="124" height="80" rx="16" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.18)" stroke-width="1.2"/>
      <path d="M -28 12 V -8 h 56 V 12 M -28 -8 V -20 h 56 V -8 M -8 -20 V -28 h 16 v 8" fill="none" stroke="#9ec5ff" stroke-width="2" stroke-linecap="round"/>
      <text y="36" fill="#c8dcff" font-size="13" font-weight="700" letter-spacing="0.04em">LANDLORD</text>
    </g>
    <!-- Contractor -->
    <g transform="translate(660, 485)">
      <rect x="-68" y="-42" width="136" height="84" rx="16" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.18)" stroke-width="1.2"/>
      <path d="M -18 8 l -8 -16 h 52 l -8 16 z M -22 -8 h 44" fill="none" stroke="#9ec5ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="16" cy="-12" r="5" fill="none" stroke="#9ec5ff" stroke-width="2"/>
      <text y="38" fill="#c8dcff" font-size="12" font-weight="700" letter-spacing="0.06em">CONTRACTOR</text>
    </g>
  </g>

  <!-- central coordination hub -->
  <g filter="url(#softGlow)" transform="translate(400, 300)">
    <circle r="88" fill="none" stroke="url(#wireGrad)" stroke-width="1.2" opacity="0.35"/>
    <circle r="72" fill="none" stroke="rgba(17,106,254,0.25)" stroke-width="1" stroke-dasharray="4 12"/>
    <circle r="56" fill="url(#hubGrad)" opacity="0.25"/>
    <circle r="48" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
    <!-- inner network glyph -->
    <g stroke="#e8f0ff" stroke-width="2" fill="none" stroke-linecap="round">
      <circle r="10" fill="rgba(17,106,254,0.4)" stroke="#b8d9ff"/>
      <path d="M -26 -8 L -12 0 M 26 -8 L 12 0 M 0 -22 L 0 -10 M 0 10 L 0 22 M -18 18 L -8 10 M 18 18 L 8 10"/>
    </g>
    <text y="68" fill="#dfeaff" font-size="11" font-weight="800" font-family="Plus Jakarta Sans, system-ui, sans-serif" text-anchor="middle" letter-spacing="0.18em">ALL AI HUB</text>
  </g>

  <!-- corner sparkles = agent chatter -->
  <g fill="#7eb8ff" opacity="0.65">
    <path d="M720 120l4 12 12 4-12 4-4 12-4-12-12-4 12-4z"/>
    <path d="M 95 86 l 3 9 9 3 -9 3 -3 9 -3 -9 -9 -3 9 -3 z"/>
    <path d="M680 520l3 8 8 3-8 3-3 8-3-8-8-3 8-3z"/>
  </g>
</svg>
